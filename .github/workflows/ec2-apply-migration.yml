name: EC2 Apply DB Migration

on:
  workflow_dispatch:

jobs:
  apply-sql:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup SSH key
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.AWS_KEY }}" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key

      - name: Check backend logs for goalTime error
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.AWS_HOST }}
          username: ${{ secrets.AWS_USERNAME }}
          key: ${{ secrets.AWS_KEY }}
          script: |
            echo "=== Backend container status ==="
            docker ps --format "table {{.Names}}\t{{.Status}}" | grep backend

            echo ""
            echo "=== Last 50 lines of backend logs ==="
            docker logs sdui-backend --tail 50 2>&1

            echo ""
            echo "=== goalTime related errors ==="
            docker logs sdui-backend 2>&1 | grep -i -E "goalTime|getGoalTime|GoalTime|GET_USER_GOAL" | tail -20

            echo ""
            echo "=== Recent ERROR/Exception lines ==="
            docker logs sdui-backend 2>&1 | grep -i -E "ERROR|Exception|Caused by" | tail -30

            echo ""
            echo "=== Test goalTime endpoint ==="
            curl -sS http://localhost:8080/api/goalTime/getGoalTime 2>&1 | head -5
