name: EC2 Diagnose & Fix

on:
  workflow_dispatch:

jobs:
  diagnose:
    runs-on: ubuntu-latest
    steps:
      - name: Setup SSH key
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.AWS_KEY }}" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key

      - name: Diagnose and restart containers
        run: |
          ssh -i ~/.ssh/deploy_key -o StrictHostKeyChecking=no \
            ${{ secrets.AWS_USERNAME }}@${{ secrets.AWS_HOST }} << 'EOF'
          echo "=== Docker containers (all) ==="
          docker ps -a --format "table {{.Names}}\t{{.Status}}\t{{.Ports}}"

          echo ""
          echo "=== Port 80 usage ==="
          sudo lsof -i :80 2>/dev/null || echo "Nothing on port 80"

          echo ""
          echo "=== Port 8080 usage ==="
          sudo lsof -i :8080 2>/dev/null || echo "Nothing on port 8080"

          echo ""
          echo "=== Port 3000 usage ==="
          sudo lsof -i :3000 2>/dev/null || echo "Nothing on port 3000"

          echo ""
          echo "=== Nginx logs ==="
          docker logs sdui-nginx --tail 20 2>&1 || echo "No nginx container"

          echo ""
          echo "=== Frontend logs ==="
          docker logs sdui-frontend --tail 20 2>&1 || echo "No frontend container"

          echo ""
          echo "=== Backend logs ==="
          docker logs sdui-backend --tail 20 2>&1 || echo "No backend container"

          echo ""
          echo "=== Restarting all containers ==="
          docker restart sdui-redis sdui-backend sdui-frontend 2>/dev/null || true
          sleep 10

          # Recreate nginx (it likely failed on first deploy)
          docker stop sdui-nginx 2>/dev/null || true
          docker rm sdui-nginx 2>/dev/null || true
          docker run -d --name sdui-nginx \
            --network sdui-network \
            -p 80:80 \
            -v /home/ubuntu/nginx.conf:/etc/nginx/conf.d/default.conf:ro \
            nginx:alpine

          sleep 5
          echo ""
          echo "=== After restart ==="
          docker ps --format "table {{.Names}}\t{{.Status}}\t{{.Ports}}"

          echo ""
          echo "=== Nginx logs after restart ==="
          docker logs sdui-nginx --tail 10

          echo ""
          echo "=== Curl test: frontend ==="
          curl -sS -o /dev/null -w "Frontend (3000): HTTP %{http_code}\n" http://localhost:3000/ 2>&1 || echo "Frontend unreachable"

          echo "=== Curl test: backend ==="
          curl -sS -o /dev/null -w "Backend (8080): HTTP %{http_code}\n" http://localhost:8080/api/ui/MAIN_PAGE 2>&1 || echo "Backend unreachable"

          echo "=== Curl test: nginx ==="
          curl -sS -o /dev/null -w "Nginx (80): HTTP %{http_code}\n" http://localhost:80/ 2>&1 || echo "Nginx unreachable"

          echo ""
          echo "=== iptables port 80 check ==="
          sudo iptables -L -n | grep -E "80|http" || echo "No iptables rules for port 80"

          echo ""
          echo "=== Port 443 check ==="
          sudo lsof -i :443 2>/dev/null || echo "Nothing on port 443"

          echo ""
          echo "=== Certbot / SSL check ==="
          which certbot 2>/dev/null && echo "certbot installed" || echo "certbot NOT installed"
          ls -la /etc/letsencrypt/live/ 2>/dev/null || echo "No letsencrypt certs"
          ls -la /etc/nginx/sites-enabled/ 2>/dev/null || echo "No nginx sites-enabled (host)"
          cat /etc/nginx/sites-enabled/yerin.duckdns.org 2>/dev/null || echo "No duckdns nginx config on host"

          echo ""
          echo "=== Host Nginx status ==="
          sudo systemctl status nginx 2>/dev/null | head -10 || echo "No host nginx service"

          echo ""
          echo "=== Current nginx.conf in container ==="
          docker exec sdui-nginx cat /etc/nginx/conf.d/default.conf 2>/dev/null | head -40 || echo "Cannot read container nginx config"
          EOF
