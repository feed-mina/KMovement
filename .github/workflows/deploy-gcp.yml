name: Deploy AI Services to GCP

on:
  push:
    branches: ["main", "refactor/krider_backup"]
    paths:
      - "src/api/**"
      - "torchserve/**"
      - "Dockerfile.worker"
      - "docker-compose.gpu.yml"
      - ".github/workflows/deploy-gcp.yml"
  workflow_dispatch:

env:
  GAR_REGION: asia-northeast3
  GAR_REPO: kride-ai
  FASTAPI_IMAGE: fastapi-server
  TORCHSERVE_IMAGE: torchserve-gpu
  WORKER_IMAGE: celery-worker

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      - name: Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@v2

      - name: Configure Docker for Artifact Registry
        run: gcloud auth configure-docker ${{ env.GAR_REGION }}-docker.pkg.dev --quiet

      - name: Set image tags
        run: |
          REGISTRY="${{ env.GAR_REGION }}-docker.pkg.dev/${{ secrets.GCP_PROJECT_ID }}/${{ env.GAR_REPO }}"
          echo "REGISTRY=$REGISTRY" >> $GITHUB_ENV
          echo "TAG=${{ github.sha }}" >> $GITHUB_ENV

      - name: Build and push FastAPI image
        run: |
          docker build -t ${{ env.REGISTRY }}/${{ env.FASTAPI_IMAGE }}:${{ env.TAG }} \
                        -t ${{ env.REGISTRY }}/${{ env.FASTAPI_IMAGE }}:latest \
                        -f src/api/Dockerfile .
          docker push ${{ env.REGISTRY }}/${{ env.FASTAPI_IMAGE }}:${{ env.TAG }}
          docker push ${{ env.REGISTRY }}/${{ env.FASTAPI_IMAGE }}:latest

      - name: Build and push Celery Worker image
        run: |
          docker build -t ${{ env.REGISTRY }}/${{ env.WORKER_IMAGE }}:${{ env.TAG }} \
                        -t ${{ env.REGISTRY }}/${{ env.WORKER_IMAGE }}:latest \
                        -f Dockerfile.worker .
          docker push ${{ env.REGISTRY }}/${{ env.WORKER_IMAGE }}:${{ env.TAG }}
          docker push ${{ env.REGISTRY }}/${{ env.WORKER_IMAGE }}:latest

      # TorchServe 이미지는 GPU 의존성이 크고 변경 빈도가 낮으므로
      # torchserve/ 디렉토리 변경 시에만 빌드
      - name: Check TorchServe changes
        id: ts_changes
        run: |
          # Registry에 이미지가 있는지 확인, 없으면 무조건 빌드
          if docker manifest inspect ${{ env.REGISTRY }}/${{ env.TORCHSERVE_IMAGE }}:latest >/dev/null 2>&1; then
            if git diff --name-only HEAD~1 HEAD 2>/dev/null | grep -q "^torchserve/"; then
              echo "changed=true" >> $GITHUB_OUTPUT
            else
              echo "changed=false" >> $GITHUB_OUTPUT
            fi
          else
            echo "changed=true" >> $GITHUB_OUTPUT
          fi

      - name: Build and push TorchServe image
        if: steps.ts_changes.outputs.changed == 'true'
        continue-on-error: true
        run: |
          docker build -t ${{ env.REGISTRY }}/${{ env.TORCHSERVE_IMAGE }}:${{ env.TAG }} \
                        -t ${{ env.REGISTRY }}/${{ env.TORCHSERVE_IMAGE }}:latest \
                        -f torchserve/Dockerfile ./torchserve
          docker push ${{ env.REGISTRY }}/${{ env.TORCHSERVE_IMAGE }}:${{ env.TAG }}
          docker push ${{ env.REGISTRY }}/${{ env.TORCHSERVE_IMAGE }}:latest

  deploy:
    needs: build-and-push
    runs-on: ubuntu-latest
    steps:
      - name: Setup SSH key
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.GCP_VM_SSH_KEY }}" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key

      - name: Create deploy script
        env:
          REGISTRY: ${{ env.GAR_REGION }}-docker.pkg.dev/${{ secrets.GCP_PROJECT_ID }}/${{ env.GAR_REPO }}
          GAR_REGION: ${{ env.GAR_REGION }}
          NEO4J_URI: ${{ secrets.NEO4J_URI }}
          NEO4J_USERNAME: ${{ secrets.NEO4J_USERNAME }}
          NEO4J_PASSWORD: ${{ secrets.NEO4J_PASSWORD }}
          NEO4J_DATABASE: ${{ secrets.NEO4J_DATABASE }}
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_KEY: ${{ secrets.SUPABASE_KEY }}
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
        run: |
          cat > /tmp/deploy.sh << 'SCRIPT_EOF'
          set -e

          REGISTRY="__REGISTRY__"
          GAR_REGION="__GAR_REGION__"

          gcloud auth configure-docker ${GAR_REGION}-docker.pkg.dev --quiet

          mkdir -p ~/kride && cd ~/kride

          cat > docker-compose.prod.yml << 'COMPOSE_EOF'
          services:
            fastapi:
              image: REGISTRY_PLACEHOLDER/fastapi-server:latest
              ports:
                - "8000:8000"
              depends_on:
                chromadb:
                  condition: service_healthy
                redis:
                  condition: service_healthy
              environment:
                - TORCHSERVE_URL=http://torchserve:8085
                - TORCHSERVE_ENABLED=true
                - TORCHSERVE_FALLBACK=true
                - CELERY_BROKER_URL=redis://redis:6379/1
                - CHROMA_MODE=client
                - CHROMA_HOST=chromadb
                - CHROMA_PORT=8000
                - KRIDE_MODELS_DIR=/app/dataset/models
                - KRIDE_RAW_DATA_DIR=/app/dataset/data/raw_ml
                - HF_HOME=/tmp/hf_cache
                - TRANSFORMERS_CACHE=/tmp/hf_cache/hub
                - NEO4J_URI=${NEO4J_URI}
                - NEO4J_USERNAME=${NEO4J_USERNAME}
                - NEO4J_PASSWORD=${NEO4J_PASSWORD}
                - NEO4J_DATABASE=${NEO4J_DATABASE}
                - SUPABASE_URL=${SUPABASE_URL}
                - SUPABASE_KEY=${SUPABASE_KEY}
                - GROQ_API_KEY=${GROQ_API_KEY}
              restart: unless-stopped

            chromadb:
              image: chromadb/chroma:latest
              ports:
                - "8100:8000"
              volumes:
                - ./chroma_db:/chroma/chroma
              environment:
                - IS_PERSISTENT=TRUE
                - ANONYMIZED_TELEMETRY=FALSE
              healthcheck:
                test: ["CMD-SHELL", "bash -c 'echo > /dev/tcp/localhost/8000'"]
                interval: 15s
                timeout: 10s
                retries: 5
                start_period: 30s
              restart: unless-stopped

            redis:
              image: redis:7-alpine
              ports:
                - "6379:6379"
              volumes:
                - redis_data:/data
              healthcheck:
                test: ["CMD", "redis-cli", "ping"]
                interval: 10s
                timeout: 3s
                retries: 3
              restart: unless-stopped

            torchserve:
              image: REGISTRY_PLACEHOLDER/torchserve-gpu:latest
              profiles: ["gpu"]
              ports:
                - "8085:8085"
                - "8086:8086"
              deploy:
                resources:
                  reservations:
                    devices:
                      - driver: nvidia
                        count: 1
                        capabilities: [gpu]
              restart: unless-stopped

            celery-worker:
              image: REGISTRY_PLACEHOLDER/celery-worker:latest
              command: celery -A src.api.celery_app worker -l info -c 2 -Q ml,media
              depends_on:
                redis:
                  condition: service_healthy
              environment:
                - TORCHSERVE_ENABLED=false
                - CELERY_BROKER_URL=redis://redis:6379/1
                - CHROMA_HOST=chromadb
                - CHROMA_PORT=8000
              restart: unless-stopped

          volumes:
            redis_data:
          COMPOSE_EOF

          sed -i "s|REGISTRY_PLACEHOLDER|${REGISTRY}|g" docker-compose.prod.yml

          cat > .env << ENV_EOF
          NEO4J_URI=__NEO4J_URI__
          NEO4J_USERNAME=__NEO4J_USERNAME__
          NEO4J_PASSWORD=__NEO4J_PASSWORD__
          NEO4J_DATABASE=__NEO4J_DATABASE__
          SUPABASE_URL=__SUPABASE_URL__
          SUPABASE_KEY=__SUPABASE_KEY__
          GROQ_API_KEY=__GROQ_API_KEY__
          ENV_EOF

          docker compose -f docker-compose.prod.yml pull --ignore-pull-failures
          docker compose -f docker-compose.prod.yml up -d

          docker image prune -af --filter "until=24h" || true

          echo "Waiting for services to start..."
          sleep 60

          echo "=== Service Status ==="
          docker compose -f docker-compose.prod.yml ps

          echo "=== FastAPI Logs ==="
          docker compose -f docker-compose.prod.yml logs --tail 20 fastapi

          echo "Deployment successful!"
          SCRIPT_EOF

          # Replace placeholders with actual values
          sed -i "s|__REGISTRY__|${REGISTRY}|g" /tmp/deploy.sh
          sed -i "s|__GAR_REGION__|${GAR_REGION}|g" /tmp/deploy.sh
          sed -i "s|__NEO4J_URI__|${NEO4J_URI}|g" /tmp/deploy.sh
          sed -i "s|__NEO4J_USERNAME__|${NEO4J_USERNAME}|g" /tmp/deploy.sh
          sed -i "s|__NEO4J_PASSWORD__|${NEO4J_PASSWORD}|g" /tmp/deploy.sh
          sed -i "s|__NEO4J_DATABASE__|${NEO4J_DATABASE}|g" /tmp/deploy.sh
          sed -i "s|__SUPABASE_URL__|${SUPABASE_URL}|g" /tmp/deploy.sh
          sed -i "s|__SUPABASE_KEY__|${SUPABASE_KEY}|g" /tmp/deploy.sh
          sed -i "s|__GROQ_API_KEY__|${GROQ_API_KEY}|g" /tmp/deploy.sh

      - name: Deploy to GCP VM
        run: |
          cat /tmp/deploy.sh | ssh -i ~/.ssh/deploy_key -o StrictHostKeyChecking=no \
            ${{ secrets.GCP_VM_USER }}@${{ secrets.GCP_VM_HOST }} bash
