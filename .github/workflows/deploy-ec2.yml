name: Deploy K-Ride services to EC2

on:
  push:
    branches: ["main", "refactor/krider_backup"]
    paths:
      - "subproject/SDUI/SDUI-server/**"
      - "src/api/**"
      - "dataset/data/raw_ml/road_scored.csv"
      - "dataset/data/raw_ml/facility_clean.csv"
      - "dataset/data/raw_ml/tour_poi.csv"
      - "dataset/models/route_graph.pkl"
      - "chroma_db/**"
      - ".dockerignore"
      - ".github/workflows/deploy-ec2.yml"

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          lfs: true

      - name: Pull LFS model assets
        run: git lfs pull --include="dataset/models/route_graph.pkl" || true

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: "17"
          distribution: "temurin"
          cache: gradle

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew
        working-directory: ./subproject/SDUI/SDUI-server

      - name: Build Spring Boot
        run: ./gradlew clean build -x test
        working-directory: ./subproject/SDUI/SDUI-server

      - name: Set image tags
        run: |
          CLEAN_BRANCH=$(echo "${{ github.ref_name }}" | sed 's/\//-/g')
          echo "BRANCH_TAG=$CLEAN_BRANCH" >> $GITHUB_ENV
          echo "SDUI_IMAGE=${{ secrets.DOCKER_USERNAME }}/sdui-app" >> $GITHUB_ENV
          echo "FASTAPI_IMAGE=${{ secrets.DOCKER_USERNAME }}/kride-fastapi" >> $GITHUB_ENV
          if [ "${{ github.ref_name }}" = "main" ]; then
            echo "TARGET_PORT=8080" >> $GITHUB_ENV
            echo "CONTAINER_NAME=sdui-backend" >> $GITHUB_ENV
            echo "DB_NAME=SDUI_TD" >> $GITHUB_ENV
          else
            echo "TARGET_PORT=8081" >> $GITHUB_ENV
            echo "CONTAINER_NAME=sdui-backend-lab" >> $GITHUB_ENV
            echo "DB_NAME=SDUI_LAB" >> $GITHUB_ENV
          fi

      - name: Login to Docker Hub
        run: echo "${{ secrets.DOCKER_PASSWORD }}" | docker login -u "${{ secrets.DOCKER_USERNAME }}" --password-stdin

      - name: Build and push Spring Boot image
        run: |
          docker build -t $SDUI_IMAGE:${{ env.BRANCH_TAG }} -t $SDUI_IMAGE:latest ./subproject/SDUI/SDUI-server
          docker push $SDUI_IMAGE:${{ env.BRANCH_TAG }}
          docker push $SDUI_IMAGE:latest

      - name: Build and push FastAPI image
        run: |
          docker build -t $FASTAPI_IMAGE:${{ env.BRANCH_TAG }} -t $FASTAPI_IMAGE:latest -f src/api/Dockerfile .
          docker push $FASTAPI_IMAGE:${{ env.BRANCH_TAG }}
          docker push $FASTAPI_IMAGE:latest

      - name: Deploy to EC2
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.AWS_HOST }}
          username: ${{ secrets.AWS_USERNAME }}
          key: ${{ secrets.AWS_KEY }}
          script: |
            set -e

            docker network inspect sdui-network >/dev/null 2>&1 || docker network create sdui-network

            docker pull ${{ env.SDUI_IMAGE }}:${{ env.BRANCH_TAG }}
            docker pull ${{ env.FASTAPI_IMAGE }}:${{ env.BRANCH_TAG }}

            docker image prune -af --filter "until=24h" || true

            if [ -n "${{ secrets.GCP_CREDENTIALS_JSON }}" ]; then
              echo "${{ secrets.GCP_CREDENTIALS_JSON }}" | base64 -d > /home/ubuntu/gcp-credentials.json
            else
              echo "{}" > /home/ubuntu/gcp-credentials.json
            fi

            docker inspect sdui-redis >/dev/null 2>&1 || docker run -d --name sdui-redis --network sdui-network redis:7-alpine

            docker stop kride-fastapi || true
            docker rm kride-fastapi || true
            docker run -d --name kride-fastapi \
              -p 8000:8000 \
              --network sdui-network \
              -e TORCHSERVE_ENABLED=false \
              -e TORCHSERVE_FALLBACK=true \
              -e CHROMA_MODE=persistent \
              -e CHROMA_PATH=/app/chroma_db \
              -e KRIDE_MODELS_DIR=/app/dataset/models \
              -e KRIDE_RAW_DATA_DIR=/app/dataset/data/raw_ml \
              -e HF_HOME=/tmp/hf_cache \
              -e TRANSFORMERS_CACHE=/tmp/hf_cache/hub \
              -e NEO4J_URI=${{ secrets.NEO4J_URI }} \
              -e NEO4J_USERNAME=${{ secrets.NEO4J_USERNAME }} \
              -e NEO4J_PASSWORD=${{ secrets.NEO4J_PASSWORD }} \
              -e NEO4J_DATABASE=${{ secrets.NEO4J_DATABASE }} \
              -e SUPABASE_URL=${{ secrets.SUPABASE_URL }} \
              -e SUPABASE_KEY=${{ secrets.SUPABASE_KEY }} \
              -e GROQ_API_KEY=${{ secrets.GROQ_API_KEY }} \
              ${{ env.FASTAPI_IMAGE }}:${{ env.BRANCH_TAG }}

            echo "Waiting for FastAPI..."
            sleep 30
            docker logs --tail 80 kride-fastapi
            docker exec kride-fastapi curl -fsS http://localhost:8000/api/health

            docker stop ${{ env.CONTAINER_NAME }} || true
            docker rm ${{ env.CONTAINER_NAME }} || true
            docker run -d --name ${{ env.CONTAINER_NAME }} \
              -p ${{ env.TARGET_PORT }}:8080 \
              --network sdui-network \
              -e SPRING_PROFILES_ACTIVE=prod \
              -e SPRING_DATASOURCE_URL=jdbc:postgresql://sdui-db:5432/${{ env.DB_NAME }} \
              -e SPRING_DATASOURCE_USERNAME=${{ secrets.DB_USERNAME }} \
              -e SPRING_DATASOURCE_PASSWORD=${{ secrets.DB_PASSWORD }} \
              -e SPRING_DATA_REDIS_HOST=sdui-redis \
              -e SPRING_MAIL_PASSWORD=${{ secrets.MAIL_PASSWORD }} \
              -e JWT_SECRET_KEY=${{ secrets.JWT_SECRET_KEY }} \
              -e OPENAI_API_KEY=${{ secrets.OPENAI_API_KEY }} \
              -e KAKAO_CLIENT_ID=${{ secrets.KAKAO_CLIENT_ID }} \
              -e KAKAO_REDIRECT_URI=${{ secrets.KAKAO_REDIRECT_URI }} \
              -e WEB_URL=${{ secrets.WEB_URL }} \
              -e AWS_ACCESS_KEY=${{ secrets.AWS_ACCESS_KEY }} \
              -e AWS_SECRET_KEY=${{ secrets.AWS_SECRET_KEY }} \
              -e FASTAPI_URL=http://kride-fastapi:8000 \
              -e KRIDE_FASTAPI_URL=http://kride-fastapi:8000 \
              -e FASTAPI_INTERNAL_API_KEY=${{ secrets.FASTAPI_INTERNAL_API_KEY }} \
              -e GCP_PROJECT_ID=${{ secrets.GCP_PROJECT_ID }} \
              -e GCP_PROCESSOR_ID=6ed87cfefab39a91 \
              -e GCP_CREDENTIALS_PATH=/app/gcp-credentials.json \
              -e SLACK_WEBHOOK_URL=${{ secrets.SLACK_WEBHOOK_URL }} \
              -e SLACK_BOT_TOKEN=${{ secrets.SLACK_BOT_TOKEN }} \
              -e SLACK_CHANNEL_ID=${{ secrets.SLACK_CHANNEL_ID }} \
              -e GOOGLE_CLIENT_ID=${{ secrets.GOOGLE_CLIENT_ID }} \
              -e GOOGLE_CLIENT_SECRET=${{ secrets.GOOGLE_CLIENT_SECRET }} \
              -e GOOGLE_REDIRECT_URI=${{ secrets.GOOGLE_REDIRECT_URI }} \
              -v /home/ubuntu/gcp-credentials.json:/app/gcp-credentials.json:ro \
              -v /home/ubuntu/study-materials:/app/assets/study:ro \
              ${{ env.SDUI_IMAGE }}:${{ env.BRANCH_TAG }}

            echo "Waiting for Spring Boot..."
            sleep 40
            docker logs --tail 80 ${{ env.CONTAINER_NAME }}
            docker exec sdui-redis redis-cli FLUSHDB || true

            echo "Deployment successful: ${{ env.CONTAINER_NAME }}:${{ env.TARGET_PORT }} + kride-fastapi:8000"
