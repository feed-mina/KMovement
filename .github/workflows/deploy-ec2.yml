name: Deploy K-Ride services to EC2

on:
  push:
    branches: ["main", "refactor/krider_backup"]
    paths:
      - "subproject/SDUI/SDUI-server/**"
      - ".dockerignore"
      - ".github/workflows/deploy-ec2.yml"
  workflow_dispatch:

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: "17"
          distribution: "temurin"

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew
        working-directory: ./subproject/SDUI/SDUI-server

      - name: Build Spring Boot
        run: ./gradlew clean build -x test
        working-directory: ./subproject/SDUI/SDUI-server

      - name: Set image tags
        run: |
          CLEAN_BRANCH=$(echo "${{ github.ref_name }}" | sed 's/\//-/g')
          echo "BRANCH_TAG=$CLEAN_BRANCH" >> $GITHUB_ENV
          echo "SDUI_IMAGE=${{ secrets.DOCKER_USERNAME }}/sdui-app" >> $GITHUB_ENV
          if [ "${{ github.ref_name }}" = "main" ]; then
            echo "TARGET_PORT=8080" >> $GITHUB_ENV
            echo "CONTAINER_NAME=sdui-backend" >> $GITHUB_ENV
            echo "DB_NAME=SDUI_TD" >> $GITHUB_ENV
          else
            echo "TARGET_PORT=8081" >> $GITHUB_ENV
            echo "CONTAINER_NAME=sdui-backend-lab" >> $GITHUB_ENV
            echo "DB_NAME=SDUI_LAB" >> $GITHUB_ENV
          fi

      - name: Login to Docker Hub
        run: echo "${{ secrets.DOCKER_PASSWORD }}" | docker login -u "${{ secrets.DOCKER_USERNAME }}" --password-stdin

      - name: Build and push Spring Boot image
        run: |
          docker build -t $SDUI_IMAGE:${{ env.BRANCH_TAG }} -t $SDUI_IMAGE:latest ./subproject/SDUI/SDUI-server
          docker push $SDUI_IMAGE:${{ env.BRANCH_TAG }}
          docker push $SDUI_IMAGE:latest

      - name: Setup SSH key
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.AWS_KEY }}" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key

      - name: Upload GCP credentials to EC2
        run: |
          if [ -n "${{ secrets.GCP_CREDENTIALS_JSON }}" ]; then
            echo "${{ secrets.GCP_CREDENTIALS_JSON }}" | base64 -d > /tmp/gcp-credentials.json
          else
            echo "{}" > /tmp/gcp-credentials.json
          fi
          scp -i ~/.ssh/deploy_key -o StrictHostKeyChecking=no \
            /tmp/gcp-credentials.json ${{ secrets.AWS_USERNAME }}@${{ secrets.AWS_HOST }}:/home/ubuntu/gcp-credentials.json

      - name: Create deploy script
        run: |
          cat > /tmp/deploy.sh << 'DEPLOY_EOF'
          set -e

          docker network inspect sdui-network >/dev/null 2>&1 || docker network create sdui-network

          docker pull __SDUI_IMAGE__:__BRANCH_TAG__

          docker image prune -af --filter "until=24h" || true

          docker inspect sdui-redis >/dev/null 2>&1 || docker run -d --name sdui-redis --network sdui-network redis:7-alpine

          docker stop __CONTAINER_NAME__ || true
          docker rm __CONTAINER_NAME__ || true
          docker run -d --name __CONTAINER_NAME__ \
            -p __TARGET_PORT__:8080 \
            --network sdui-network \
            -e SPRING_PROFILES_ACTIVE=prod \
            -e SPRING_DATASOURCE_URL=jdbc:postgresql://sdui-db:5432/__DB_NAME__ \
            -e SPRING_DATASOURCE_USERNAME=__DB_USERNAME__ \
            -e SPRING_DATASOURCE_PASSWORD=__DB_PASSWORD__ \
            -e SPRING_DATA_REDIS_HOST=sdui-redis \
            -e SPRING_MAIL_PASSWORD=__MAIL_PASSWORD__ \
            -e JWT_SECRET_KEY=__JWT_SECRET_KEY__ \
            -e OPENAI_API_KEY=__OPENAI_API_KEY__ \
            -e KAKAO_CLIENT_ID=__KAKAO_CLIENT_ID__ \
            -e KAKAO_REDIRECT_URI=__KAKAO_REDIRECT_URI__ \
            -e WEB_URL=__WEB_URL__ \
            -e AWS_ACCESS_KEY=__S3_ACCESS_KEY__ \
            -e AWS_SECRET_KEY=__S3_SECRET_KEY__ \
            -e FASTAPI_URL=__GCP_FASTAPI_URL__ \
            -e KRIDE_FASTAPI_URL=__GCP_FASTAPI_URL__ \
            -e FASTAPI_INTERNAL_API_KEY=__FASTAPI_INTERNAL_API_KEY__ \
            -e GCP_PROJECT_ID=__GCP_PROJECT_ID__ \
            -e GCP_PROCESSOR_ID=6ed87cfefab39a91 \
            -e GCP_CREDENTIALS_PATH=/app/gcp-credentials.json \
            -e SLACK_WEBHOOK_URL=__SLACK_WEBHOOK_URL__ \
            -e SLACK_BOT_TOKEN=__SLACK_BOT_TOKEN__ \
            -e SLACK_CHANNEL_ID=__SLACK_CHANNEL_ID__ \
            -e GOOGLE_CLIENT_ID=__GOOGLE_CLIENT_ID__ \
            -e GOOGLE_CLIENT_SECRET=__GOOGLE_CLIENT_SECRET__ \
            -e GOOGLE_REDIRECT_URI=__GOOGLE_REDIRECT_URI__ \
            -v /home/ubuntu/gcp-credentials.json:/app/gcp-credentials.json:ro \
            -v /home/ubuntu/study-materials:/app/assets/study:ro \
            __SDUI_IMAGE__:__BRANCH_TAG__

          echo "Waiting for Spring Boot..."
          sleep 40
          docker logs --tail 80 __CONTAINER_NAME__
          docker exec sdui-redis redis-cli FLUSHDB || true

          echo "Deployment successful: __CONTAINER_NAME__:__TARGET_PORT__ (FastAPI -> GCP)"
          DEPLOY_EOF

          sed -i "s|__SDUI_IMAGE__|${{ env.SDUI_IMAGE }}|g" /tmp/deploy.sh
          sed -i "s|__BRANCH_TAG__|${{ env.BRANCH_TAG }}|g" /tmp/deploy.sh
          sed -i "s|__CONTAINER_NAME__|${{ env.CONTAINER_NAME }}|g" /tmp/deploy.sh
          sed -i "s|__TARGET_PORT__|${{ env.TARGET_PORT }}|g" /tmp/deploy.sh
          sed -i "s|__DB_NAME__|${{ env.DB_NAME }}|g" /tmp/deploy.sh
          sed -i "s|__DB_USERNAME__|${{ secrets.DB_USERNAME }}|g" /tmp/deploy.sh
          sed -i "s|__DB_PASSWORD__|${{ secrets.DB_PASSWORD }}|g" /tmp/deploy.sh
          sed -i "s|__MAIL_PASSWORD__|${{ secrets.MAIL_PASSWORD }}|g" /tmp/deploy.sh
          sed -i "s|__JWT_SECRET_KEY__|${{ secrets.JWT_SECRET_KEY }}|g" /tmp/deploy.sh
          sed -i "s|__OPENAI_API_KEY__|${{ secrets.OPENAI_API_KEY }}|g" /tmp/deploy.sh
          sed -i "s|__KAKAO_CLIENT_ID__|${{ secrets.KAKAO_CLIENT_ID }}|g" /tmp/deploy.sh
          sed -i "s|__KAKAO_REDIRECT_URI__|${{ secrets.KAKAO_REDIRECT_URI }}|g" /tmp/deploy.sh
          sed -i "s|__WEB_URL__|${{ secrets.WEB_URL }}|g" /tmp/deploy.sh
          sed -i "s|__S3_ACCESS_KEY__|${{ secrets.AWS_ACCESS_KEY }}|g" /tmp/deploy.sh
          sed -i "s|__S3_SECRET_KEY__|${{ secrets.AWS_SECRET_KEY }}|g" /tmp/deploy.sh
          sed -i "s|__GCP_FASTAPI_URL__|${{ secrets.GCP_FASTAPI_URL }}|g" /tmp/deploy.sh
          sed -i "s|__FASTAPI_INTERNAL_API_KEY__|${{ secrets.FASTAPI_INTERNAL_API_KEY }}|g" /tmp/deploy.sh
          sed -i "s|__GCP_PROJECT_ID__|${{ secrets.GCP_PROJECT_ID }}|g" /tmp/deploy.sh
          sed -i "s|__SLACK_WEBHOOK_URL__|${{ secrets.SLACK_WEBHOOK_URL }}|g" /tmp/deploy.sh
          sed -i "s|__SLACK_BOT_TOKEN__|${{ secrets.SLACK_BOT_TOKEN }}|g" /tmp/deploy.sh
          sed -i "s|__SLACK_CHANNEL_ID__|${{ secrets.SLACK_CHANNEL_ID }}|g" /tmp/deploy.sh
          sed -i "s|__GOOGLE_CLIENT_ID__|${{ secrets.GOOGLE_CLIENT_ID }}|g" /tmp/deploy.sh
          sed -i "s|__GOOGLE_CLIENT_SECRET__|${{ secrets.GOOGLE_CLIENT_SECRET }}|g" /tmp/deploy.sh
          sed -i "s|__GOOGLE_REDIRECT_URI__|${{ secrets.GOOGLE_REDIRECT_URI }}|g" /tmp/deploy.sh

      - name: Deploy to EC2
        run: |
          cat /tmp/deploy.sh | ssh -i ~/.ssh/deploy_key -o StrictHostKeyChecking=no \
            ${{ secrets.AWS_USERNAME }}@${{ secrets.AWS_HOST }} bash
