name: Deploy Frontend to EC2

on:
  push:
    branches: ["main"]
    paths:
      - "subproject/SDUI/metadata-project/**"
      - ".github/workflows/ec2-deploy-frontend.yml"
  workflow_dispatch:

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Login to Docker Hub
        run: echo "${{ secrets.DOCKER_PASSWORD }}" | docker login -u "${{ secrets.DOCKER_USERNAME }}" --password-stdin

      - name: Build and push Frontend image
        run: |
          docker build \
            --build-arg NEXT_PUBLIC_BACKEND_URL=https://yerin.duckdns.org \
            --build-arg NEXT_PUBLIC_KAKAO_MAP_APP_KEY="${{ secrets.NEXT_PUBLIC_KAKAO_MAP_APP_KEY }}" \
            --build-arg NEXT_PUBLIC_GOOGLE_MAPS_API_KEY="${{ secrets.NEXT_PUBLIC_GOOGLE_MAPS_API_KEY }}" \
            -t ${{ secrets.DOCKER_USERNAME }}/sdui-frontend:latest \
            -t ${{ secrets.DOCKER_USERNAME }}/sdui-frontend:${{ github.sha }} \
            ./subproject/SDUI/metadata-project
          docker push ${{ secrets.DOCKER_USERNAME }}/sdui-frontend:latest
          docker push ${{ secrets.DOCKER_USERNAME }}/sdui-frontend:${{ github.sha }}

      - name: Deploy Frontend to EC2
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.AWS_HOST }}
          username: ${{ secrets.AWS_USERNAME }}
          key: ${{ secrets.AWS_KEY }}
          script: |
            set -e

            # Ensure network exists
            docker network inspect sdui-network >/dev/null 2>&1 || docker network create sdui-network

            # Pull latest image
            docker pull ${{ secrets.DOCKER_USERNAME }}/sdui-frontend:latest

            # Stop and remove old frontend container
            docker rm -f sdui-frontend 2>/dev/null || true

            # Run frontend with port 3000 exposed to host
            docker run -d --name sdui-frontend \
              -p 3000:3000 \
              --network sdui-network \
              -e NODE_ENV=production \
              -e BACKEND_URL=http://sdui-backend:8080 \
              -e FASTAPI_URL=http://34.64.221.240:8000 \
              --restart unless-stopped \
              ${{ secrets.DOCKER_USERNAME }}/sdui-frontend:latest

            # Remove Docker Nginx if exists (conflicts with Host Nginx on port 80)
            docker rm -f sdui-nginx 2>/dev/null || true
            sleep 2
            # Restart Host Nginx (SSL termination on 80+443)
            sudo systemctl restart nginx || true

            # Wait for startup
            echo "Waiting for frontend to start..."
            sleep 15

            # Health check
            echo "=== Frontend container status ==="
            docker ps --filter name=sdui-frontend --format "table {{.Names}}\t{{.Status}}\t{{.Ports}}"

            echo ""
            echo "=== Frontend logs ==="
            docker logs --tail 20 sdui-frontend

            echo ""
            echo "=== Curl test ==="
            curl -sS -o /dev/null -w "Frontend (3000): HTTP %{http_code}\n" http://localhost:3000/ 2>&1 || echo "Frontend not ready yet"

            # Clean up old images
            docker image prune -af --filter "until=24h" || true

            echo "Frontend deployment complete!"
